services:
  clientes:
    build:
      context: .
      dockerfile: ./ClienteService/Dockerfile
    container_name: clientes_api
    ports:
      - "8001:80"
    volumes:
      - ./ClienteService/app:/code/app
      - ./conexao:/code/conexao

  gerenciarbens:
    build:
      context: .
      dockerfile: ./GerenciarBensService/Dockerfile
    container_name: gerenciarbens_api
    ports:
      - "8002:80"
    volumes:
      - ./GerenciarBensService/app:/code/app
      - ./conexao:/code/conexao

  gerenciarreservas:
    build:
      context: .
      dockerfile: ./GerenciarReservaService/Dockerfile
    container_name: gerenciarreservas_api
    ports:
      - "8003:80"
    volumes:
      - ./GerenciarReservaService/app:/code/app
      - ./conexao:/code/conexao