<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Imovel</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="container">
        <div class="card card-large">

            <h2>Cadastro de Imóvel</h2>
            <p class="subtitle">Preencha os dados do imóvel</p>

            <div class="form-group">
                <input type="text" id="cep" placeholder="Digite o CEP do Imovel" onfocusout="buscarCep()">
                <input type="text" id="endereco" placeholder="Digite o endereço do Imovel">
                <input type="text" id="bairro" placeholder="Digite o bairro do Imovel">
                <input type="text" id="cidade" placeholder="Digite a cidade do Imovel">
                <input type="text" id="estado" placeholder="Digite o estado do Imovel">
                <input type="text" id="numero" placeholder="Digite o número do Imovel">
                <input type="text" id="complemento" placeholder="Digite o complemento do Imovel">
                <input type="text" id="comodos" placeholder="Digite a quantidade de comodos do Imovel">
                <input type="text" id="metros_quadrados" placeholder="Digite a quantidade de metros quadrados do Imovel">
                <input type="text" id="valor" placeholder="Digite o valor do Imovel">
            </div>

            <button onclick="cadastrarImovel()" id="cadastrar">Cadastrar Imovel</button>

            <div class="links-group">
                <a href="./reservaImovel.html">Voltar para Reservar Imovel</a>
                <a href="./reservarVeiculo.html">Voltar para Reservar Veículo</a>
                <a href="./cadastrarVeiculo.html">Cadastrar Veículo</a>
            </div>

        </div>
    </div>

    <script src="./js/cadastroImovel.js"></script>

</body>
</html>
