<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Imoveis</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="page-wrapper">
        <div class="container">
            <div class="card card-wide">

                <h2>Imóveis disponíveis</h2>
                <p class="subtitle">Selecione o período desejado para reservar</p>

                <div class="date-group">
                    <div class="field-group">
                        <label for="data_inicio">Data de início</label>
                        <input type="date" id="data_inicio" required>
                    </div>

                    <div class="field-group">
                        <label for="data_fim">Data de fim</label>
                        <input type="date" id="data_fim" required>
                    </div>
                </div>

                <div id="listaImoveis" class="list-grid"></div>

                <button onclick="logout()" id="logout">Logout</button>

                <div class="links-group">
                    <a href="./cadastrarImovel.html">Cadastrar Imovel</a>
                    <a href="./cadastrarVeiculo.html">Cadastrar Veículo</a>
                    <a href="./reservarVeiculo.html">Reservar Veículo</a>
                </div>

            </div>
        </div>
    </div>
    
    <script src="./js/reservaImovel.js"></script>

</body>
</html>
